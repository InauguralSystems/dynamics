name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: suite (in devcontainer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Build the devcontainer (EigenScript pinned by .devcontainer/Dockerfile's
      # EIGS_REF) and run the suite inside it — the same image a Codespace opens.
      # EIGENSCRIPT=eigenscript points the scripts at the on-PATH runtime.
      # (Replaces the old clone-HEAD-and-build step, which pinned nothing.)
      - name: Build devcontainer and run suite
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            EIGENSCRIPT=eigenscript bash tests/test_smoke.sh
            EIGENSCRIPT=eigenscript bash tests/test_lab.sh
